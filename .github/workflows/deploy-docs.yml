name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
  # Allow triggering a manual deploy from the Actions tab
  workflow_dispatch:

# Grant the workflow the permissions needed to deploy Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent multiple concurrent deployments; skip runs queued behind an
# in-progress run but do not cancel the in-progress run.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
