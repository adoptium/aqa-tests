name: 'Disabled Tests Linter'
on:
  pull_request:
    paths:
    - 'openjdk/excludes/**'
    - '**/playlist.xml'
  workflow_dispatch:

permissions:
  contents: read
    
jobs:
  disableTestsLinter:
    runs-on: ubuntu-latest
    env:
        AQA_ISSUE_TRACKER_GITHUB_USER: ${{ github.actor }}
        AQA_ISSUE_TRACKER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set up Python 3.8
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
            python-version: 3.8

      - name: checkout current repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install reqs
        run: |
          pip install -r scripts/disabled_tests/requirements.txt

      - name: discover disabled tests
        run : |
            find openjdk/excludes -name '*ProblemList*.txt' > exclude_files.txt
            # This line ignores exclude files for jdk versions other than LTS and JDK26+
            sed -i '/openjdk\(8\|11\|17\|21\|25\|\(2[6-9]\|[3-9][0-9]\|[1-9][0-9][0-9]\)\|valhalla\)\(\-\|\.\)/!d' exclude_files.txt
            find . -name "playlist.xml" -not -path "scripts" > playlist_files.txt

      - name: Run exclude_parser.py on ProblemList files
        run: |
            cat exclude_files.txt | python3 scripts/disabled_tests/exclude_parser.py -v > exclude.json

      - name: Run playlist_parser.py on Playlist files
        run: |
            cat playlist_files.txt | python3 scripts/disabled_tests/playlist_parser.py -v > playlist.json

      - name: Run issue_status.py on both ProblemList and Playlist files # Using the --minimal option, so it will only validate issue urls. Nothing more.
        run: |
            echo "::group::Flatten and group parsed ProblemList and Playlist files."
            jq -s 'flatten(1)' exclude.json playlist.json > all.json
            echo "::endgroup::"
            echo "::group::Run issue_status.py"
            cat all.json | python3 scripts/disabled_tests/issue_status.py --minimal --verbose
            echo "::endgroup::"

  duplicates:
    runs-on: ubuntu-latest
    steps:
      - name: checkout current repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Find any duplicate tests in the playlists or exclusion files.
        run: |
            find openjdk/excludes -name '*ProblemList*.txt' > exclude_files.txt
            # This line ignores exclude files for jdk versions other than LTS and JDK26+
            sed -i '/openjdk\(8\|11\|17\|21\|25\|\(2[6-9]\|[3-9][0-9]\|[1-9][0-9][0-9]\)\|valhalla\)\(\-\|\.\)/!d' exclude_files.txt
            bash scripts/disabled_tests/duplicate_finder.sh "$(pwd)/exclude_files.txt"
