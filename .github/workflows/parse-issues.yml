name: "Parse all disabled issues"
on:
  schedule:
    - cron: '0 4 * * 0'  # every Sunday, 4am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parse_issues:
    runs-on: ubuntu-latest
    env:
      AQA_ISSUE_TRACKER_GITHUB_USER: ${{ github.actor }}
      AQA_ISSUE_TRACKER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set up Python 3.14
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: 3.14
      - name: checkout current repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: install reqs
        run: |
          pip install -r scripts/disabled_tests/requirements.txt
      - name: discover disabled tests
        run : |
          echo "::group::openjdk exclude files"
          find openjdk/excludes -name '*ProblemList*.txt' > exclude_files.txt
          # This line ignores exclude files for jdk versions other than LTS and JDK26+
          sed -i '/openjdk\(8\|11\|17\|21\|25\|\(2[6-9]\|[3-9][0-9]\|[1-9][0-9][0-9]\)\|valhalla\)\(\-\|\.\)/!d' exclude_files.txt
          cat exclude_files.txt
          echo "::endgroup::"
          echo "::group::playlist files"
          find . -name "playlist.xml" -not -path "scripts" | tee playlist_files.txt
          echo "::endgroup::"
      - name: run scripts
        run: |
          echo "::group::parsing"
          cat exclude_files.txt | python scripts/disabled_tests/exclude_parser.py -v > exclude.json
          cat playlist_files.txt | python scripts/disabled_tests/playlist_parser.py -v > playlist.json
          echo "::endgroup::"
          echo "::group::merging"
          jq -s 'flatten(1)' exclude.json playlist.json > all.json
          echo "::endgroup::"
          echo "::group::status"
          cat all.json | python scripts/disabled_tests/issue_status.py --verbose > output.json
          cat output.json
          echo "::endgroup::"
      - name: store artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: disabled_tests
          path: output.json
          retention-days: 90
