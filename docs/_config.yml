title: AQAvit Documentation
description: >-
  Documentation for the Eclipse AQAvit project — the quality assurance toolkit
  for OpenJDK builds produced by the Eclipse Adoptium project.

url: "https://adoptium.github.io"
baseurl: "/aqa-tests"

remote_theme: just-the-docs/just-the-docs@v0.10.1

# Site logo shown in the sidebar header
# logo: "/assets/images/aqavit-light.png"

# Aux links shown in the top-right navigation bar
aux_links:
  "GitHub":
    - "https://github.com/adoptium/aqa-tests"
  "Adoptium":
    - "https://adoptium.net"

aux_links_new_tab: true

# Footer content
footer_content: >-
  Copyright &copy; Eclipse Adoptium contributors.
  Licensed under the
  <a href="https://www.apache.org/licenses/LICENSE-2.0">Apache License 2.0</a>.

# Enable or disable the default search
search_enabled: true

# Heading anchor links
heading_anchors: true

# Permalink style
permalink: pretty

# Exclude non-documentation files from the Jekyll build
exclude:
  - Gemfile
  - Gemfile.lock
  - pdf/
